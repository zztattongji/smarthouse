services:
  nginx:
    image: nginx:alpine
    container_name: smarthouse-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend1-iot
      - backend2-ai
    restart: unless-stopped
    networks:
      - smarthouse-net

  backend1-iot:
    build: ./backend1_iot
    container_name: smarthouse-iot
    expose:
      - "3000"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - smarthouse-net

  backend2-ai:
    build: ./backend2_ai
    container_name: smarthouse-ai
    expose:
      - "5000"
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - smarthouse-net

networks:
  smarthouse-net:
    driver: bridge
